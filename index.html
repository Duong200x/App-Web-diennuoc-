<!doctype html>
<html lang="vi">
  <head>
    <!-- make -->
    <meta charset="utf-8" />
    <!-- Viewport chuẩn, hỗ trợ safe-area -->
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Ghi chỉ số điện nước, tính tiền, xuất phiếu Word/Excel" />
    <meta name="theme-color" content="#0d6efd" />

    <!-- PWA / iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="ĐiệnNước" />
    <link rel="apple-touch-icon" href="/icons/6.png" />
    <link rel="icon" href="/icons/6.png" type="image/png" />

    <title>Quản lý ghi số điện nước</title>

    <!-- Guard CSS: loại bỏ margin mặc định và bù safe-area khi cần -->
    <style>
      html, body { height: 100%; }
      body { margin: 0; }
      /* Nếu ROM nào đó vẫn overlay status bar, header sẽ tự bù tai thỏ */
      .topbar { padding-top: env(safe-area-inset-top); }
      .boot-screen {
        position: fixed;
        inset: 0;
        z-index: 250;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background: #f6f7f9;
        color: #111827;
      }
      .boot-box {
        width: min(92vw, 420px);
        display: flex;
        gap: 14px;
        align-items: center;
        padding: 16px 18px;
        border: 1px solid #e6e8ec;
        border-radius: 14px;
        background: #fff;
        box-shadow: 0 10px 30px rgba(15, 23, 42, .12);
      }
      .boot-spinner {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 3px solid #bfdbfe;
        border-top-color: #0d6efd;
        animation: boot-spin .8s linear infinite;
        flex: 0 0 auto;
      }
      .boot-title { font-weight: 800; font-size: 16px; }
      .boot-message { margin-top: 3px; font-size: 13px; color: #4b5563; }
      .boot-screen.hide { display: none; }
      .theme-dark .boot-screen { background: #0f1115; color: #e5e7eb; }
      .theme-dark .boot-box { background: #151a21; border-color: #2a2f3a; box-shadow: 0 10px 30px rgba(0, 0, 0, .45); }
      .theme-dark .boot-message { color: #94a3b8; }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <header class="topbar">
      <h1 class="app-title"><a href="#/list">Quản lý ghi số điện nước</a></h1>
      <!-- by -->
      <!-- Chỉ giữ 2 mục ngoài topbar -->
      <nav class="nav">
        <a href="#/list">Danh sách</a>
        <a href="#/add">Thêm cư dân</a>
      </nav>

      <!-- Nút bóng đèn + menu ba gạch -->
      <div class="topbar-actions">
        <button id="theme-toggle" class="icon-btn" aria-label="Chuyển giao diện">
          <span class="icon-light">💡</span>
          <span class="icon-dark" style="display:none;">🌙</span>
        </button>
        <button id="menu-toggle" class="icon-btn" aria-label="Mở menu">☰</button>
      </div>
    </header>
    <!-- trandinh -->
    <!-- Panel menu xổ xuống (gom các chức năng còn lại) -->
    <div id="side-menu" class="menu-panel" hidden>
      <a href="#/history"  class="menu-item">Lịch sử</a>
      <a href="#/config"   class="menu-item">Điều chỉnh giá</a>
      <a href="#/template" class="menu-item">Mẫu phiếu</a>
      <a href="#/room"     class="menu-item">Phòng</a>
    </div>
    <!--duong-->
    <main id="app"></main>
    <div id="boot-screen" class="boot-screen" role="status" aria-live="polite">
      <div class="boot-box">
        <div class="boot-spinner" aria-hidden="true"></div>
        <div>
          <div class="boot-title">Đang tải dữ liệu</div>
          <div id="boot-message" class="boot-message">Đang chuẩn bị ứng dụng...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
