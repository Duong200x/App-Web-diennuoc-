<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Dien Nuoc App architecture overview</title>
  <desc id="desc">High-level diagram showing UI, business logic, local storage, export, printing, and Firebase sync.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="panel2" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="panel3" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="panel4" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#cbd5e1"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; fill: #e2e8f0; }
      .small { font-size: 22px; opacity: 0.9; }
      .label { font-size: 26px; font-weight: 700; }
      .title { font-size: 40px; font-weight: 800; }
      .muted { font-size: 24px; opacity: 0.8; }
      .line { stroke: #cbd5e1; stroke-width: 4; fill: none; marker-end: url(#arrow); opacity: 0.9; }
    </style>
  </defs>

  <rect width="1200" height="720" rx="36" fill="url(#bg)"/>

  <text x="70" y="74" class="title">Dien Nuoc App - Architecture Overview</text>
  <text x="70" y="112" class="muted">PWA + Android APK for monthly meter readings, debt tracking, export, and offline-first sync</text>

  <g filter="url(#shadow)">
    <rect x="70" y="170" width="290" height="160" rx="28" fill="url(#panel)"/>
    <text x="105" y="220" class="label">UI Layer</text>
    <text x="105" y="258" class="small">ListView, DetailView,</text>
    <text x="105" y="290" class="small">HistoryView, ConfigView,</text>
    <text x="105" y="322" class="small">RoomView, TemplateView</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="455" y="170" width="290" height="160" rx="28" fill="url(#panel2)"/>
    <text x="492" y="220" class="label">Business Logic</text>
    <text x="492" y="258" class="small">readings.js, history.js,</text>
    <text x="492" y="290" class="small">rates.js, importResidents.js,</text>
    <text x="492" y="322" class="small">safe merge and debt rollover</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="840" y="170" width="290" height="160" rx="28" fill="url(#panel3)"/>
    <text x="875" y="220" class="label">Persistence</text>
    <text x="875" y="258" class="small">LocalStorage + IndexedDB</text>
    <text x="875" y="290" class="small">offline queue, backup snapshots,</text>
    <text x="875" y="322" class="small">room state cache</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="160" y="430" width="320" height="170" rx="28" fill="url(#panel4)"/>
    <text x="195" y="482" class="label">Document Output</text>
    <text x="195" y="520" class="small">Excel export</text>
    <text x="195" y="552" class="small">Word .docx export</text>
    <text x="195" y="584" class="small">browser save + mobile save</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="520" y="430" width="320" height="170" rx="28" fill="#0f766e"/>
    <text x="555" y="482" class="label">Native Utilities</text>
    <text x="555" y="520" class="small">Capacitor StatusBar</text>
    <text x="555" y="552" class="small">Bluetooth ESC/POS printing</text>
    <text x="555" y="584" class="small">APK build path via Capacitor</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="880" y="430" width="220" height="170" rx="28" fill="#334155"/>
    <text x="914" y="482" class="label">Cloud Sync</text>
    <text x="914" y="520" class="small">Firebase Auth</text>
    <text x="914" y="552" class="small">Firestore rooms</text>
    <text x="914" y="584" class="small">realtime merge</text>
  </g>

  <path class="line" d="M360 250 L455 250"/>
  <path class="line" d="M745 250 L840 250"/>
  <path class="line" d="M600 330 L600 430"/>
  <path class="line" d="M530 330 L330 430"/>
  <path class="line" d="M680 330 L980 430"/>

  <text x="80" y="668" class="muted">Highlights: offline-first UX, monthly rollover logic, debt propagation, multi-device sync, and export/print workflows.</text>
</svg>
